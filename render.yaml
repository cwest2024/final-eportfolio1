services:
  - type: web
    name: final-eportfolio-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: PORT
        value: 3001
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: static
    name: final-eportfolio-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false